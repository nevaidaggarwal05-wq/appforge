plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.maximoney.credit"
    compileSdk 36

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.maximoney.credit"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode 18
        versionName "1.2.11"
        multiDexEnabled true

        // AdMob App ID — Google's MobileAds SDK reads this from the
        // AndroidManifest <meta-data> tag at init time, BEFORE any Dart code
        // runs, so it cannot be runtime-driven. Set the real production
        // App ID here once before going live with ads. The shell manifest
        // references it via ${admobAppId}.
        //
        // Currently using Google's official test placeholder — replace
        // with the real `ca-app-pub-XXX~YYY` from AdMob console.
        // The same value should also be entered in the admin panel under
        // App config → AdMob → "AdMob App ID" so the live config and
        // built APK stay in sync.
        manifestPlaceholders.admobAppId = "ca-app-pub-3940256099942544~3347511713"
    }

    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                keyAlias     keystoreProperties['keyAlias']
                keyPassword  keystoreProperties['keyPassword']
                storeFile    file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.6.0')
    implementation 'com.google.firebase:firebase-analytics'  // required by google-services plugin; no app-side use
    implementation 'androidx.multidex:multidex:2.0.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
