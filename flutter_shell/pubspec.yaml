name: app_template
description: AppForge v5 white-label Flutter shell. Wraps any website in a native app with remote config, push, biometric, and more.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase — ONLY these three (NO remote_config, NO analytics)
  firebase_core:          ^3.6.0
  firebase_crashlytics:   ^4.1.3
  firebase_messaging:     ^15.1.3

  # WebView
  webview_flutter:        ^4.10.0

  # HTTP client to AppForge backend
  dio:                    ^5.7.0

  # Storage + platform
  shared_preferences:     ^2.3.2
  connectivity_plus:      ^6.1.0
  package_info_plus:      ^8.1.0

  # Native features
  url_launcher:           ^6.3.1
  local_auth:             ^2.3.0
  device_info_plus:       ^10.1.0
  in_app_review:          ^2.0.9
  flutter_local_notifications: ^17.2.3

  # Ads (off by default, gated by remote flag)
  google_mobile_ads:      ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^5.0.0

flutter:
  uses-material-design: true
  # No bundled assets — splash logo is loaded remotely via Image.network
  # from the logo_url in the remote config.
